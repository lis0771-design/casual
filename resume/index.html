<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="김민석 — 남성복·캐주얼 의상 디자이너, 10년 경력, 샤넬, 장관상 수상" />
  <title>자기소개서 | 김민석 · 남성복 디자인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-layout">
        <div class="hero-copy">
          <p class="hero-label">Menswear Designer · Cover Letter</p>
          <h1 class="hero-title">자기소개서</h1>
          <p class="hero-lead" id="hero-lead">김민석 · 남성복 · 캐주얼 의상 디자인</p>
          <div class="hero-meta" id="hero-meta" aria-label="지원 정보"></div>
          <nav class="section-nav" id="section-nav" aria-label="섹션 이동"></nav>
        </div>
        <figure class="hero-visual">
          <img
            src="images/hero.jpg"
            alt="재단용 마네킹과 스케치가 놓인 디자인 스튜디오"
            width="640"
            height="800"
            loading="eager"
            decoding="async"
          />
          <figcaption class="hero-visual-caption">디자인 완성도와 착용감을 함께 설계하는 남성복 디자이너</figcaption>
        </figure>
      </div>
    </header>

    <main class="content" id="content" aria-live="polite">
      <div class="loading-card card">
        <p class="loading-text">자기소개서를 불러오는 중…</p>
      </div>
    </main>

    <footer class="site-footer">
      <p class="footer-note">정적 페이지 · HTML · CSS · JavaScript</p>
      <button type="button" class="btn btn-secondary btn-sm" id="print-btn">인쇄 / PDF 저장</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
